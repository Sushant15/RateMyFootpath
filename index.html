<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rate My Footpath</title>

  <!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- Leaflet CSS (for map container) -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

  <style>
    #map {
      height: 45vh;
      border-radius: 8px;
    }
  </style>


	<!-- Leaflet Script (for map container) -->
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
</head>
<body class="bg-light">

<!-- Header -->
<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">🚶 Rate My Footpath</span>
  </div>
</nav>

<div class="container my-3">

  <!-- Map Section -->
  <div class="card mb-3">
    <div class="card-body p-0">
      <div id="map"></div>
    </div>
    <div class="card-footer text-center text-muted small">
      Drag the pin to exact location
    </div>
  </div>

  <!-- Location Controls -->
  <div class="card mb-3">
    <div class="card-body">
      <div class="d-grid gap-2 mb-3">
        <button id="fml-button" class="btn btn-primary btn-lg">
          📍 Find My Location
        </button>
      </div>

      <label class="form-label">Address</label>
      <textarea
        class="form-control"
        rows="2"
        placeholder="Address will appear here"
        readonly
      ></textarea>
    </div>
  </div>

  <!-- Issues Section -->
  <div class="card mb-3">
    <div class="card-body">
      <h5 class="card-title mb-3">🛠️ What’s wrong with this footpath?</h5>

      <div class="row">
        <div class="col-12 col-md-6">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="issue1">
            <label class="form-check-label" for="issue1">
              Broken pavement
            </label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="issue2">
            <label class="form-check-label" for="issue2">
              Waterlogging
            </label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="issue3">
            <label class="form-check-label" for="issue3">
              Obstructions (vendors, poles)
            </label>
          </div>
        </div>

        <div class="col-12 col-md-6">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="issue4">
            <label class="form-check-label" for="issue4">
              Not wheelchair accessible
            </label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="issue5">
            <label class="form-check-label" for="issue5">
              Poor lighting
            </label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="issue6">
            <label class="form-check-label" for="issue6">
              Garbage / cleanliness
            </label>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Additional Comments -->
  <div class="card mb-4">
    <div class="card-body">
      <label class="form-label">Additional comments (optional)</label>
      <textarea
        class="form-control"
        rows="3"
        placeholder="Anything else you'd like to report?"
      ></textarea>
    </div>
  </div>

  <!-- Submit Button -->
  <div class="d-grid mb-5">
    <button id="submit-button" class="btn btn-success btn-lg">
      ✅ Submit Footpath Rating
    </button>
    <small class="text-center text-muted mt-2">
      Takes less than 10 seconds
    </small>
  </div>

</div>


<!-- main Script  -->
<script src="./main.js"></script>
</body>
</html>
