<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rate My Footpath</title>

  <!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- Leaflet CSS (for map container) -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>

  <style>
    #map {
      height: 45vh;
      border-radius: 8px;
    }
  </style>


	<!-- Leaflet Script (for map container) -->
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
</head>
<body class="bg-light">

<!-- Header -->
<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">🚶 Rate My Footpath</span>
  </div>
</nav>

<div class="container my-3">

  <!-- Map Section -->
  <div class="card mb-3">
    <div class="card-body p-0">
      <div id="map"></div>
    </div>
    <div class="card-footer text-center text-muted small">
      Drag the pin to exact location
    </div>
  </div>

  <!-- Location Controls -->
  <div class="card mb-3">
    <div class="card-body">
      <div class="d-grid gap-2 mb-3">
        <button id="fml-button" class="btn btn-primary btn-lg">
          📍 Find My Location
        </button>
      </div>

      <label class="form-label">Address</label>
      <textarea
        class="form-control"
        rows="2"
        placeholder="Address will appear here"
        readonly
      ></textarea>
    </div>
  </div>

  <!-- Issues Section -->
<div class="card mb-3">
  <div class="card-body">
    <h5 class="card-title mb-3">🛠️ What’s wrong with this footpath?</h5>

    <div class="row">

      <!-- Column 1 -->
      <div class="col-12 col-md-6">

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="broken_footpath" id="1">
          <label class="form-check-label" for="issue1">Broken Footpath</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="waterlogging" id="2">
          <label class="form-check-label" for="issue2">Waterlogging</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="potholes" id="3">
          <label class="form-check-label" for="issue3">Potholes</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="street_vendors" id="4">
          <label class="form-check-label" for="issue4">Street Vendors</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="construction_material" id="5">
          <label class="form-check-label" for="issue5">Construction Material</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="garbage_dumped" id="6">
          <label class="form-check-label" for="issue6">Garbage Dumped</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="vehicles_parked" id="7">
          <label class="form-check-label" for="issue7">Vehicles Parked</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="poles_signboards" id="8">
          <label class="form-check-label" for="issue8">Poles / Signboards</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="barricades" id="9">
          <label class="form-check-label" for="issue9">Barricades</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="animals_blocking" id="10">
          <label class="form-check-label" for="issue10">Animals Blocking</label>
        </div>

      </div>

      <!-- Column 2 -->
      <div class="col-12 col-md-6">

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="overgrown_plants" id="11">
          <label class="form-check-label" for="issue11">Overgrown Plants</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="no_streetlights" id="12">
          <label class="form-check-label" for="issue12">No Streetlights</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="wheelchair_ramp" id="13">
          <label class="form-check-label" for="issue13">No Wheelchair Ramp</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="tactile_tiles" id="14">
          <label class="form-check-label" for="issue14">Missing Tactile Tiles</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="narrow_walkway" id="15">
          <label class="form-check-label" for="issue15">Narrow Walkway</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="footpath_ends" id="16">
          <label class="form-check-label" for="issue16">Footpath Ends Suddenly</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="no_zebra_crossing" id="17">
          <label class="form-check-label" for="issue17">No Zebra Crossing</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="vehicles_entering" id="18">
          <label class="form-check-label" for="issue18">Vehicles Entering Footpath</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="no_ped_signal" id="19">
          <label class="form-check-label" for="issue19">No Pedestrian Signal</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="unsafe_night" id="20">
          <label class="form-check-label" for="issue20">Unsafe at Night</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="issues" value="exposed_wires" id="21">
          <label class="form-check-label" for="issue21">Exposed Wires</label>
        </div>

      </div>

    </div>
  </div>
</div>


  <!-- Submit Button -->
  <div class="d-grid mb-5">
    <button id="submit-button" class="btn btn-success btn-lg">
      ✅ Submit Footpath Rating
    </button>
    <small class="text-center text-muted mt-2">
      Takes less than 10 seconds
    </small>
  </div>

</div>


<!-- main Script  -->
<script src="./main.js"></script>
</body>
</html>
